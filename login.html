<!-- HTML5 belgesi olduğunu belirtir. -->
<!doctype html>

<!-- HTML dokümanının başlangıcını tanımlar ve dil ayarını belirtir. -->
<html lang="en">

  <!-- HTML dokümanının başlık bölümünü başlatır.-->
  <head>

    <!-- Sekmede gözüken küçük resim. -->
    <link rel="shortcut icon" type="image/png" href="img/favicon.png"/>

    <!-- Karakter kodlamasını UTF-8 olarak ayarladım, bu etisket sayesinde farklı dillerdeki karakterlerin doğru şekilde görüntülenmesini sağladım. -->
    <meta charset="utf-8">

    <!-- Cihazın ekran boyutuna göre otomatik ölçeklendirme yapılmasını sağlayan meta etiketi. -->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Web sayfasının başlığını belirler. -->
    <title>Giriş Yap</title>

    <!-- Bootstrap CSS kütüphanesinin bağlantı cümlesi. -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">

    <style>

      /* Sayfanın arka plan rengini ayarladım. */
      body {
        background-color: #f8f9fa;
        background: "C:\Users\Burak\Desktop\Proje\img\arkaplan.jpg";
      }

      /* "MainForm" id'sine dahip form elemanının arka plan rengisi, kenarlığını, iç boşluğunu ve gölgelendirmeleini ayarladım. */
      #MainForm {
        background-color: white;
        border-radius: 10px;
        padding: 20px;
        box-shadow: 0px 0px 20px rgba(0, 0, 0, 0.1);
      }

      /* "btn-primary" id'sine sahip butonun arka plan rengini ve kenarlık rengini ayarladım. */
      .btn-primary {
        background-color: #4CAF50;
        border-color: #4CAF50;
      }

      /* "btn-primary" id'sine sahip butonun hover halini yani imleç üzerine gelindiğindeki halindeki arka plan rengini ve kenarlık rengini ayarladım. */
      .btn-primary:hover {
        background-color: #45a049;
        border-color: #45a049;
      }

      #MainForm{
        background-color: #c5e2f7;
        right: 150px;
        top: 120px;
      }

      body{
        
        background-image: url("img/arkaplan2.jpg");
        background-repeat: no-repeat;
        background-position: bottom;
        background-attachment:fixed;
        background-size:cover;
      }

      .socials {
        list-style: none;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 1rem 0 3rem 0;
      }

      .socials li {
        margin: 0 10px;
      }

      .socials a{
        text-decoration: none;
        color: #fff;
      }

      .socials a i{
        font-size: 1.1rem;
        transition: color .4s ease;
      }

      .socials a:hover i{
        color: aqua;
      }

      .content h5{
        font-size: smaller;
        text-align: center;
        margin: 14px;
        left: 18px;
        position: relative;
      }

    </style>

  </head>

  <body>

    <!-- Bootstrap'den gelen "container" sınıfını kullanarak içeriği merkezlemek ve kenarlarda bir miktar boşluk bırakmak için "container" sınıfını kullandım. -->
    <div class="container mt-5">

      <!-- Bootstrap'den gelen "row" sınıfını kullanarak içeriği satırlara bölmek için "row" sınıfını kullandım. -->
      <div class="row justify-content-center">

        <!-- Bootstrap'den gelen "col-md-6" sınıfını kullanarak içeriği yarısına kadar genişletmek için "col-md-6" sınıfı. -->
        <div class="col-md-6">

          <!-- Giriş formunu içeren bir HTML formu oluşturdum. Burada Kullanıcının email'ini ve şifresini alıyorum. -->
          <form id="MainForm">

            <!-- Form başlığı -->
            <h2 class="mb-3 text-center">Giriş Yap</h2>

            <!-- Email giriş alanı -->
            <div class="form-floating mb-3">
              <input required type="email" class="form-control" id="emailInp">
              <label for="emailInp">Email</label>
            </div>

            <!-- tc giriş alanı | firebase tarafında giriş kısmını eposta ve şfire seçtiğimiz için tc no ile giriş yaptıramıyoruz... -->
            <div class="form-floating mb-3">
              <input required type="text" class="form-control" id="tcno" maxlength="11">
              <label for="tcno">TC Kimlik Numarası</label>
            </div>

             <!-- Şifre giriş alanı -->
            <div class="form-floating mb-3">
              <input type="password" class="form-control" id="passwordInp">
              <label for="floatingPassword">Şifre</label>
            </div>

            <!-- Giriş yap ve Kayıt ol butonları -->
            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-primary">Giriş Yap</button>
              <a href="register.html" class="btn btn-secondary">Kayıt Ol</a>
            </div>

            <div class="content">
              <h5>Sosyal Medya'da GSB!</h5>
              <ul class="socials">
                <li><a href="https://www.facebook.com/gencliksporbak"><i class="fa fa-facebook"></i></a></li>
                <li><a href="https://www.youtube.com/@gencliksporbak"><i class="fa fa-youtube"></i></a></li>
                <li><a href="https://twitter.com/gencliksporbak"><i class="fa fa-twitter"></i></a></li>
                <li><a href="https://www.instagram.com/gencliksporbak/"><i class="fa fa-instagram"></i></a></li>
                <li><a href=https://www.linkedin.com/company/gencliksporbak/""><i class="fa fa-linkedin-square"></i></a></li>
              </ul>
            </div>
          </form>
        </div>
      </div>
    </div>

    

    <script src="https://kit.fontawesome.com/24fb7699d2.js" crossorigin="anonymous"></script>
  
    <!-- Bootstrap kütüphanesinin JavaScript bağlantı cümlesi. -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
    
    <!-- Firebase ile ilgili JavaScript kodunu içeren bir modül bağlantısı -->
    <script type="module">

      //  bu importlar Firebase'in JavaScript SDK'sını kullanarak Firebase Authentication ve Firebase Realtime Database gibi Firebase servislerine erişmek için gereklidir. 
      // "initializeApp"i Firebase projenizi başlatmak için,
      // "getDatabase", "get", "ref", "child" Firebase Realtime Database'e erişim sağlar, veri tabanına veri okuma, yazma ve işlemler yapmamızı sağlıyor.
      // "getAuth", "signInWithEmailAndPassword" Firebase Authentication ile kullanıcı kimlik doğrulamasını sağlayıp, kullanıcıların kaydolmasını ve giriş yapmasını sağladım.
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
      import { getDatabase, get, ref, child } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";
      import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

      // Firebase yapılandırma bilgileri
      const firebaseConfig = {
        apiKey: "AIzaSyAtb7-3OYXlr_RNdcKF3EUZlFH9yekwkuo",
        authDomain: "makinee-9a42d.firebaseapp.com",
        databaseURL: "https://makinee-9a42d-default-rtdb.firebaseio.com",
        projectId: "makinee-9a42d",
        storageBucket: "makinee-9a42d.appspot.com",
        messagingSenderId: "959353723807",
        appId: "1:959353723807:web:29d8fd2bb4e142a09efbaa"
      };
    
      // Firebase uygulamasını başlattım.
      const app = initializeApp(firebaseConfig);

      // Firebase veritabanına erişim için bir referansı.
      const db = getDatabase();

      // Firebase kimlik doğrulama servisine erişim için bir referansı.
      const auth = getAuth(app);

       // Veritabanında bir referansı.
      const dbref = ref(db);

      // HTML'deki giriş formunda bulunan alanlardaki bilgileri javascript tarafına aktardım.

      let EmailInp = document.getElementById('emailInp'); // HTML belgesindeki 'emailInp' ID'li öğeyi, input'u seçtim ve bu öğeyi EmailInp değişkenine atadım. Bu, kullanıcının e-posta adresini girdiği alanı temsil ediyor.

      let PasswordInp = document.getElementById('passwordInp'); // HTML belgesindeki 'passwordInp' ID'li öğeyi, input'u seçtim ve bu öğeyi PasswordInp değişkenine atadım. Bu, kullanıcının şifresini girdiği alanı temsil ediyor.

      let MainForm = document.getElementById('MainForm'); // HTML belgesindeki 'MainForm' ID'li öğeyi seçtim ve bu öğeyi MainForm değişkenine atadım. Bu, formun kendisini temsil ediyor.

      // Kullanıcı girişi işlevi
      let SignInUser = evt => {
        evt.preventDefault();
        
        // Firebase kimlik doğrulama servisi kullanarak email ve şifreyle giriş yap
        signInWithEmailAndPassword(auth, EmailInp.value, PasswordInp.value)
        .then((credentials)=>{

          // Firebase Realtime Database'den kullanıcının kimlik bilgilerini alır. dbref değişkeni, veri tabanına erişimi temsil eder. credentials.user.uid, Firebase Authentication ile giriş yapan kullanıcının benzersiz kimlik bilgisini temsil eder. Bu benzersiz kimlik, kullanıcının veri tabanındaki kaydını bulmak için kullanılır.
          get(child(dbref, 'UsersAuthList/' + credentials.user.uid)).then((snapshot)=>{
            if(snapshot.exists){

              // Kullanıcının adı ve soyadı gibi bilgileri, tarayıcı oturum depolama alanına JSON formatında kaydeder. Bu bilgiler daha sonra kullanıcının tarayıcıdaki diğer sayfalarda kullanılabilir.
                sessionStorage.setItem("user-info", JSON.stringify({
                firstname: snapshot.val().firstname,
                lastname: snapshot.val().lastname
              }))

              // Kullanıcının kimlik bilgilerini, tarayıcı oturum depolama alanına JSON formatında kaydeder. Bu, kullanıcının oturum bilgilerini diğer sayfalarda kullanmak için saklar.
              sessionStorage.setItem("user-creds", JSON.stringify(credentials.user));

              // Kullanıcı başarılı bir şekilde giriş yaptığında, ana sayfaya yönlendirir.
              window.location.href = 'index.html';

            }
          })
        })

        // Giriş işlemi sırasında bir hata oluştuğunda gerçekleşecek işlemleri tanımlar. 
        // Hata durumunda, kullanıcıya bir hata mesajı gösterir ve konsola hata bilgilerini kaydeder.
        .catch((error)=>{
          alert(error.message);
          console.log(error.code);
          console.log(error.message);

        })
      }

      // Form gönderildiğinde kullanıcı girişi işlevini çağır.
      MainForm.addEventListener('submit', SignInUser);

    </script>  

  </body>

</html>
