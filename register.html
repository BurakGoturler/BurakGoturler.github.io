<!doctype html>
<html lang="en">
  <head>
    <link rel="shortcut icon" type="image/png" href="img/favicon.png"/>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kayıt Ol</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <style>
      body {
        background-color: #f8f9fa;
      }
      #MainForm {
        background-color: white;
        border-radius: 10px;
        padding: 20px;
        box-shadow: 0px 0px 20px rgba(0, 0, 0, 0.1);
      }
      .btn-primary {
        background-color: #4CAF50;
        border-color: #4CAF50;
      }
      .btn-primary:hover {
        background-color: #45a049;
        border-color: #45a049;
      }

      #MainForm{
        background-color: #c5e2f7;
        right: 150px;
        top: 120px;
      }
      
      body{
        background-image: url("img/arkaplan2.jpg");
        background-repeat: no-repeat;
        background-position: bottom;
        background-attachment:fixed;
        background-size:cover;
      }

      .socials {
        list-style: none;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 1rem 0 3rem 0;
      }

      .socials li {
        margin: 0 10px;
      }

      .socials a{
        text-decoration: none;
        color: #fff;
      }

      .socials a i{
        font-size: 1.1rem;
        transition: color .4s ease;
      }

      .socials a:hover i{
        color: aqua;
      }

      .content h5{
        font-size: smaller;
        text-align: center;
        margin: 5px;
        position: relative;
      }
    </style>
  </head>
  <body>

    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <form id="MainForm">

            <h2 class="mb-3 text-center">Kayıt Ol</h2>
            <div class="form-floating mb-3">
              <input type="text" class="form-control" id="fnameInp">
              <label for="fnameInp">İsim</label>
            </div>
            
            <div class="form-floating mb-3">
              <input type="text" class="form-control" id="lnameInp">
              <label for="lnameInp">Soyisim</label>
            </div>

            <div class="form-floating mb-3">
              <input required type="text" class="form-control" id="tcno" maxlength="11">
              <label for="tcno">TC Kimlik Numarası</label>
            </div>

            <div class="form-floating mb-3">
              <input required type="email" class="form-control" id="emailInp">
              <label for="emailInp">Email</label>
            </div>
            
            <div class="form-floating mb-3">
              <input type="password" class="form-control" id="passwordInp">
              <label for="passwordInp">Şifre</label>
            </div>

            <div class="form-floating mb-3">
              <input type="number" class="form-control" id="roomnumber">
              <label for="roomnumber">Oda Numarası</label>
            </div>

            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-primary">Kayıt Ol</button>
              <a href="login.html" class="btn btn-secondary">Giriş Yap</a>
            </div>

            <div class="content">
              <ul class="socials">
                <h5>Sosyal Medya'da GSB!</h5>
                <li><a href="https://www.facebook.com/gencliksporbak"><i class="fa fa-facebook"></i></a></li>
                <li><a href="https://www.youtube.com/@gencliksporbak"><i class="fa fa-youtube"></i></a></li>
                <li><a href="https://twitter.com/gencliksporbak"><i class="fa fa-twitter"></i></a></li>
                <li><a href="https://www.instagram.com/gencliksporbak/"><i class="fa fa-instagram"></i></a></li>
                <li><a href=https://www.linkedin.com/company/gencliksporbak/""><i class="fa fa-linkedin-square"></i></a></li>
              </ul>
            </div>

          </form>
          
        </div>
      </div>
    </div>

    <!-- yazı fontları ve ikonlar için font awesome cdn'i -->
    <script src="https://kit.fontawesome.com/24fb7699d2.js" crossorigin="anonymous"></script>
  
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
    
    <script type="module">

      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
      import { getDatabase, set, ref } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";
      import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyAtb7-3OYXlr_RNdcKF3EUZlFH9yekwkuo",
        authDomain: "makinee-9a42d.firebaseapp.com",
        databaseURL: "https://makinee-9a42d-default-rtdb.firebaseio.com",
        projectId: "makinee-9a42d",
        storageBucket: "makinee-9a42d.appspot.com",
        messagingSenderId: "959353723807",
        appId: "1:959353723807:web:29d8fd2bb4e142a09efbaa"
      };
    
      const app = initializeApp(firebaseConfig);
      const db = getDatabase();
      const auth = getAuth(app);

      let FnameInp = document.getElementById('fnameInp');
      let LnameInp = document.getElementById('lnameInp');
      let TcNo = document.getElementById('tcno');
      let EmailInp = document.getElementById('emailInp');
      let PasswordInp = document.getElementById('passwordInp');
      let RoomNumber = document.getElementById('roomnumber');
      let MainForm = document.getElementById('MainForm');

      let registerUser = evt => {
        evt.preventDefault();
        
        createUserWithEmailAndPassword(auth, EmailInp.value, PasswordInp.value)
        .then((credentials)=>{
          set(ref(db, 'UsersAuthList/' + credentials.user.uid),{
            firstname: FnameInp.value,
            lastname: LnameInp.value
          })
          alert("Kayıt başarıyla tamamlandı!");
        })
        .catch((error)=>{
          alert(error.message);
          console.log(error.code);
          console.log(error.message);
        })
      }

      MainForm.addEventListener('submit', registerUser);

    </script>  
  </body>
</html>
